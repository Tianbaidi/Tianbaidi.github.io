<!-- Switch social badges based on site skin -->
<script>
  (function() {
    const hour = (new Date()).getHours();
    let isDark = (hour < 5 || hour >= 19);  // midnight & sunset are dark
    // sunset (17-19) is warm/dark, treat as dark for badge contrast
    let badgeDir = (isDark || (hour >= 17 && hour < 19)) ? '/badges-dark/' : '/badges/';
    const basePath = '{{ site.baseurl }}' || '';
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.social-badge-img').forEach(function(img) {
        var badge = img.getAttribute('data-badge');
        if (badge) {
          img.src = basePath + badgeDir + badge + '.svg';
        }
      });
    });
  })();
</script>
