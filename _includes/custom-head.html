<script>
  (function() {
    var skins = ['sunrise', 'midnight'];
    var darkBadges = { midnight: true };

    function getSavedSkin() {
      try { var s = localStorage.getItem('skin'); return skins.indexOf(s) >= 0 ? s : null; }
      catch(e) { return null; }
    }

    function getAutoSkin() {
      var h = new Date().getHours();
      return (h >= 5 && h < 19) ? 'sunrise' : 'midnight';
    }

    function updateSkinCSS(skin) {
      var links = document.querySelectorAll('link[rel="stylesheet"]');
      for (var i = 0; i < links.length; i++) {
        if (links[i].href.indexOf('skin-') !== -1) {
          links[i].href = links[i].href.replace(/skin-[a-z]+/, 'skin-' + skin);
          break;
        }
      }
    }

    function updateBadges(skin) {
      var dir = darkBadges[skin] ? '/badges-dark/' : '/badges/';
      var imgs = document.querySelectorAll('.social-badge-img');
      for (var i = 0; i < imgs.length; i++) {
        var badge = imgs[i].getAttribute('data-badge');
        if (badge) imgs[i].src = dir + badge + '.svg';
      }
    }

    function updateIcon(skin) {
      var sun = document.querySelector('.theme-icon-sun');
      var moon = document.querySelector('.theme-icon-moon');
      if (skin === 'midnight') {
        if (sun) sun.style.display = 'none';
        if (moon) moon.style.display = 'inline';
      } else {
        if (sun) sun.style.display = 'inline';
        if (moon) moon.style.display = 'none';
      }
    }

    // Immediately correct skin CSS to avoid flash
    var saved = getSavedSkin();
    var skin = saved || getAutoSkin();
    updateSkinCSS(skin);
    window.__themeSkin = skin;

    // Defer DOM-dependent updates
    document.addEventListener('DOMContentLoaded', function() {
      updateBadges(window.__themeSkin);
      updateIcon(window.__themeSkin);

      var btn = document.getElementById('theme-toggle-btn');
      if (btn) {
        btn.addEventListener('click', function() {
          var current = getSavedSkin() || getAutoSkin();
          var next = (current === 'sunrise') ? 'midnight' : 'sunrise';
          updateSkinCSS(next);
          updateBadges(next);
          updateIcon(next);
          try { localStorage.setItem('skin', next); } catch(e) {}
        });
      }
    });
  })();
</script>
